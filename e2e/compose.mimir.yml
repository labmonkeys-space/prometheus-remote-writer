# E2E sandbox — Grafana Mimir backend (single-binary).
#
# Usage:
#   docker compose -f compose.mimir.yml up -d --build
#   docker compose -f compose.mimir.yml down -v --remove-orphans
#
# UI endpoints:
#   http://localhost:8980   OpenNMS (admin/admin)
#   http://localhost:3000   Grafana (admin/admin, or anonymous Viewer)
#   http://localhost:9009   Mimir
#
# See compose.prometheus.yml for the `extends:` rationale.

name: prometheus-remote-writer-e2e

services:

  postgres:
    extends:
      file: compose.base.yml
      service: postgres

  kafka:
    extends:
      file: compose.base.yml
      service: kafka

  core:
    extends:
      file: compose.base.yml
      service: core
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway:
    extends:
      file: compose.base.yml
      service: gateway
    environment:
      GATEWAY_REMOTE_WRITE__ENDPOINT: http://mimir:9009/api/v1/push
      CONFIG_FILE: /etc/gateway/config.toml
    volumes:
      - ./gateway/mimir.toml:/etc/gateway/config.toml:ro
    depends_on:
      kafka:
        condition: service_healthy
      mimir:
        condition: service_healthy

  grafana:
    extends:
      file: compose.base.yml
      service: grafana
    volumes:
      - ./grafana/datasources/mimir.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro

  mimir:
    image: grafana/mimir:2.14.0
    command:
      - "-config.file=/etc/mimir/mimir.yaml"
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9009/ready"]
      interval: 5s
      timeout:  3s
      retries:  30

volumes:
  postgres-data:
  opennms-data:
  grafana-data:
  mimir-data:
