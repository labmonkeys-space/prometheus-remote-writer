# E2E sandbox — VictoriaMetrics backend.
#
# Usage:
#   docker compose -f compose.victoriametrics.yml up -d --build
#   docker compose -f compose.victoriametrics.yml down -v --remove-orphans
#
# UI endpoints:
#   http://localhost:8980   OpenNMS (admin/admin)
#   http://localhost:3000   Grafana (admin/admin, or anonymous Viewer)
#   http://localhost:8428   VictoriaMetrics
#
# See compose.prometheus.yml for the `extends:` rationale.

name: prometheus-remote-writer-e2e

services:

  postgres:
    extends:
      file: compose.base.yml
      service: postgres

  kafka:
    extends:
      file: compose.base.yml
      service: kafka

  core:
    extends:
      file: compose.base.yml
      service: core
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway:
    extends:
      file: compose.base.yml
      service: gateway
    environment:
      GATEWAY_REMOTE_WRITE__ENDPOINT: http://victoriametrics:8428/api/v1/write
    depends_on:
      kafka:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy

  grafana:
    extends:
      file: compose.base.yml
      service: grafana
    volumes:
      - ./grafana/datasources/victoriametrics.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    command:
      - "-storageDataPath=/vm-data"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:8428"
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/vm-data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 5s
      timeout:  3s
      retries:  20

volumes:
  postgres-data:
  opennms-data:
  grafana-data:
  vm-data:
