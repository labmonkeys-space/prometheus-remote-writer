name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write
  # OIDC token for Sigstore — required by actions/attest-build-provenance
  # to mint an ephemeral signing certificate against this workflow run's
  # identity.
  id-token: write
  # GitHub Artifact Attestations API — required to upload the provenance
  # attestation bundle to the repo's /attestations endpoint.
  attestations: write
  # Needed by the final "Trigger docs publish" step, which dispatches
  # publish-docs.yml via `gh workflow run` after the release is created.
  actions: write

env:
  # Maintainer whose GitHub-registered GPG key(s) sign release tags.
  # Trust anchor: https://github.com/<RELEASE_MAINTAINER>.gpg — the URL
  # returns all keys ever added to the profile, so historical keys also
  # verify (key rotation does not invalidate prior releases unless the
  # key is removed from the GitHub profile).
  RELEASE_MAINTAINER: indigo423

jobs:
  release:
    name: Build KAR and create GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Resolve tag and version
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag signature
        # Refuse to release from a tag not signed by a key on the
        # maintainer's GitHub profile. The .gpg URL returns all keys
        # ever added to that profile, so historical keys also verify
        # — key rotation does not invalidate prior releases unless the
        # key is removed from the GitHub profile.
        #
        # No GPG key material in CI secrets: the public-key fetch is
        # the entire trust path on the workflow side. The maintainer's
        # private key only ever sits on their workstation (used at
        # `git tag -s` time, per RELEASING.md pre-flight).
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          # Import all public keys registered on the maintainer's GitHub
          # profile. github.com/<user>.gpg is the canonical trust path.
          curl -sSL "https://github.com/${RELEASE_MAINTAINER}.gpg" \
            | gpg --import
          # The Checkout step's `ref` may not have populated tag refs.
          # Fetch the tag explicitly so `git tag -v` can find it.
          git fetch origin "+refs/tags/${TAG}:refs/tags/${TAG}" --no-tags
          if ! git tag -v "${TAG}"; then
            echo "::error::Tag ${TAG} is not signed by a key on github.com/${RELEASE_MAINTAINER}'s profile (or the signature does not verify). Sign with 'git tag -s' using a key registered on your GitHub profile and re-tag." >&2
            exit 1
          fi

      - name: Build KAR
        # Skip tests on the release path — CI already ran `make verify` on
        # the tagged commit before it was pushed. Shipping an untested
        # build would be a problem, but gating here is belt-and-braces.
        run: make kar MAVEN_FLAGS="-B --no-transfer-progress -U"

      - name: Generate SBOM
        # Activate the opt-in `sbom` profile to produce a CycloneDX 1.6
        # aggregate SBOM at target/bom.json. The profile is gated so that
        # local `make build` and `make kar` stay fast; only the release
        # path generates the SBOM.
        run: make sbom MAVEN_FLAGS="-B --no-transfer-progress -U"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found; using auto-generated notes" >&2
            exit 0
          fi
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry for $VERSION; using auto-generated notes" >&2
          else
            echo "notes-file=release-notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Locate KAR artifact
        id: kar
        run: |
          KAR=$(find assembly/kar/target -maxdepth 1 -name '*.kar' -type f | head -1)
          if [ -z "$KAR" ]; then
            echo "::error::No KAR found in assembly/kar/target" >&2
            exit 1
          fi
          echo "path=$KAR" >> "$GITHUB_OUTPUT"

      - name: Stage SBOM at release name
        # Copy target/bom.json to the versioned filename consumers will
        # see on the release page. Kept as a separate step (rather than
        # inlined into Create GitHub Release) so the attestation step
        # can take subject-path against the final on-disk path.
        id: sbom
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          SBOM="prometheus-remote-writer-${VERSION}.cdx.json"
          if [ ! -f target/bom.json ]; then
            echo "::error::target/bom.json missing; the Generate SBOM step did not produce the expected file." >&2
            exit 1
          fi
          cp target/bom.json "$SBOM"
          echo "path=$SBOM" >> "$GITHUB_OUTPUT"

      - name: Attest KAR build provenance
        # SLSA Build Provenance attestation for the KAR. Signed by
        # Sigstore using a Fulcio-issued ephemeral certificate bound to
        # this workflow run's GitHub OIDC token. Attestation is stored
        # on the repo's /attestations endpoint and surfaced to verifiers
        # via `gh attestation verify`.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.kar.outputs.path }}

      - name: Attest SBOM build provenance
        # Same treatment for the SBOM. Two attestations, one per
        # release artifact — verifiers run `gh attestation verify`
        # against each downloaded file independently.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.sbom.outputs.path }}

      - name: Create GitHub Release
        # Two assets only: the KAR and the SBOM. Authenticity is verified
        # via the build provenance attestations (one per artifact),
        # fetched server-side by `gh attestation verify`. No .asc / KEYS
        # / checksum files — the attestation encodes the artifact's
        # SHA-256 and binds it to this workflow's OIDC identity.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          KAR="${{ steps.kar.outputs.path }}"
          SBOM="${{ steps.sbom.outputs.path }}"
          ASSETS=(
            "$KAR"
            "$SBOM"
          )
          if [ -n "${{ steps.notes.outputs.notes-file }}" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "${{ steps.notes.outputs.notes-file }}" \
              "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      # The `release: published` event fired by `gh release create` runs
      # under GITHUB_TOKEN, so by design GitHub Actions does NOT cascade
      # it to other workflows. Manually dispatch publish-docs against
      # the just-released tag — `workflow_dispatch` is allowed even
      # when initiated by GITHUB_TOKEN.
      - name: Trigger docs publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          gh workflow run publish-docs.yml --ref main -f tag="$TAG"
