name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write
  # Push the gateway image to GitHub Container Registry (ghcr.io).
  packages: write
  # OIDC token for Sigstore — required by actions/attest-build-provenance
  # to mint an ephemeral signing certificate against this workflow run's
  # identity.
  id-token: write
  # GitHub Artifact Attestations API — required to upload the provenance
  # attestation bundles to the repo's /attestations endpoint.
  attestations: write

env:
  # Maintainer whose GitHub-registered GPG key(s) sign release tags.
  # Trust anchor: https://github.com/<RELEASE_MAINTAINER>.gpg — the URL
  # returns all keys ever added to the profile, so historical keys also
  # verify (key rotation does not invalidate prior releases unless the
  # key is removed from the GitHub profile).
  RELEASE_MAINTAINER: indigo423

jobs:
  release:
    name: Build image and create GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Resolve tag and version
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag signature
        # Refuse to release from a tag not signed by a key on the
        # maintainer's GitHub profile. The .gpg URL returns all keys
        # ever added to that profile, so historical keys also verify
        # — key rotation does not invalidate prior releases unless the
        # key is removed from the GitHub profile.
        #
        # No GPG key material in CI secrets: the public-key fetch is
        # the entire trust path on the workflow side. The maintainer's
        # private key only ever sits on their workstation (used at
        # `git tag -s` time, per RELEASING.md pre-flight).
        #
        # `git tag -v` returns 0 for ANY good signature by ANY imported
        # key, including keys with no GPG web-of-trust. That is fine
        # here — the trust assertion is "the key is on the maintainer's
        # GitHub profile", not GPG's trust model. The asserted-key-count
        # check below is what enforces "the .gpg fetch actually
        # returned keys."
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"
          # Import all public keys registered on the maintainer's GitHub
          # profile. github.com/<user>.gpg is the canonical trust path.
          # --fail makes curl exit non-zero on 4xx/5xx; --retry guards
          # against transient GitHub blips. Without --fail an HTTP 404
          # (e.g., maintainer renamed) would silently feed an empty
          # body into gpg --import.
          curl --fail --silent --show-error --location \
               --retry 3 --retry-delay 5 \
               "https://github.com/${RELEASE_MAINTAINER}.gpg" \
            | gpg --import
          # Belt-and-braces: confirm at least one public key actually
          # landed in the keyring. Catches the corner case where the
          # GitHub profile has zero keys (empty body, no keys imported,
          # gpg exits 0).
          KEY_COUNT=$(gpg --list-keys --with-colons | grep -c '^pub:')
          if [ "$KEY_COUNT" -eq 0 ]; then
            echo "::error::No public keys imported from https://github.com/${RELEASE_MAINTAINER}.gpg. Add a GPG key under your GitHub Settings → SSH and GPG keys before tagging." >&2
            exit 1
          fi
          # The Checkout step's `ref` may not have populated tag refs.
          # Fetch the tag explicitly so `git tag -v` can find it.
          git fetch origin "+refs/tags/${TAG}:refs/tags/${TAG}" --no-tags
          if ! git tag -v "${TAG}"; then
            echo "::error::Tag ${TAG} is not signed by a key on github.com/${RELEASE_MAINTAINER}.gpg (or the signature does not verify). Sign with 'git tag -s' using a key registered on github.com/${RELEASE_MAINTAINER}'s profile and re-tag." >&2
            exit 1
          fi

      - name: Compute image reference
        id: image
        # GHCR requires a lowercase path; ${GITHUB_REPOSITORY,,} lowercases
        # owner/repo so an owner with uppercase letters still resolves.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # Register binfmt handlers so the arm64 layer of the multi-arch
        # build can run under emulation on the amd64 runner.
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435  # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.resolve.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.resolve.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # We attest provenance separately via attest-build-provenance with
          # push-to-registry; disabling BuildKit's inline provenance keeps a
          # clean image index whose digest is what we attest and pin.
          provenance: false

      - name: Generate CycloneDX SBOM
        # Syft scans the just-pushed image by its immutable digest and emits
        # a CycloneDX SBOM describing the shipped image (OS packages + the
        # Rust dependency tree). For a multi-arch index syft resolves the
        # runner's native platform (linux/amd64); the package set is
        # identical across arches.
        uses: anchore/sbom-action@7b36ad622f042cab6f59a75c2ac24ccb256e9b45  # v0.20.4
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: prometheus-remote-writer-${{ steps.resolve.outputs.version }}.cdx.json
          upload-artifact: false

      - name: Attest image build provenance
        # SLSA Build Provenance for the image, signed by Sigstore using a
        # Fulcio-issued ephemeral certificate bound to this run's GitHub
        # OIDC token, and pushed to the registry alongside the image so
        # `gh attestation verify oci://<image>@<digest>` resolves it.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: prometheus-remote-writer-${{ steps.resolve.outputs.version }}.cdx.json

      - name: Assemble release notes
        id: notes
        # Always produce a notes file: the per-version CHANGELOG section (if
        # present) followed by the image reference pinned by @sha256:<digest>
        # and the verification command, so the release records exactly which
        # image it corresponds to.
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve.outputs.version }}"
          IMAGE="${{ steps.image.outputs.name }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          : > release-notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { p=1; next }
              p && /^## \[/ { exit }
              p { print }
            ' CHANGELOG.md >> release-notes.md
          fi
          {
            printf '\n## Container image\n\n'
            printf 'Published to GHCR and pinned by immutable digest:\n\n'
            printf '```\n%s@%s\n```\n' "$IMAGE" "$DIGEST"
            printf '\nVerify build provenance:\n\n'
            printf '```\ngh attestation verify oci://%s@%s --repo %s\n```\n' \
              "$IMAGE" "$DIGEST" "$GITHUB_REPOSITORY"
          } >> release-notes.md
          echo "file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # One uploaded asset: the versioned CycloneDX SBOM. The image is not
        # uploaded — it lives in GHCR and is referenced by digest in the
        # notes; authenticity is established by the SLSA provenance
        # attestation, verified with `gh attestation verify`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          SBOM="prometheus-remote-writer-${{ steps.resolve.outputs.version }}.cdx.json"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            "$SBOM"
